<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        background: #f5f5f5;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: Arial, Helvetica, sans-serif;
      }

      .card {
        width: 100%;
        max-width: 320px;
        background: white;
        border-radius: 28px;
        padding: 48px 40px;
        box-shadow: 0 6px 24px rgba(0, 0, 0, 0.08);
        text-align: center;
      }

      h1 {
        font-size: 36px;
        margin: 0 0 16px;
      }

      .subtitle {
        color: #666;
        margin-bottom: 28px;
      }
      .google-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        width: 100%;
        padding: 16px;
        border-radius: 16px;
        background: #111;
        color: white;
        text-decoration: none;
        font-weight: 600;
        margin-top: 16px;
        border: none;
        cursor: pointer;
      }
      .google-icon {
        background: white;
        color: black;
        border-radius: 50%;
        width: 20px;
        height: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 12px;
        font-weight: bold;
      }
    </style>
  </head>

  <body>
    <div class="card">
      {% block content %}{% endblock %}
    </div>
  </body>
</html>
